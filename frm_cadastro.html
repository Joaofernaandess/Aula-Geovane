<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Usuário</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="card">
        <h1>Cadastrar Novo Usuário</h1>

        <div class="form-group">
            <label for="codigo">Código</label>
            <input type="text" id="codigo" placeholder="Autonumérico" disabled>
        </div>

        <div class="form-group">
            <label for="nomeUsuario">Nome Completo do Usuário</label>
            <input type="text" id="nomeUsuario" placeholder="Digite o nome completo">
        </div>

        <div class="form-group">
            <label for="nomeLogin">Nome de Login</label>
            <input type="text" id="nomeLogin" placeholder="Digite o nome de login">
        </div>

        <div class="form-group senha-group">
            <label for="senha">Senha</label>
            <div class="input-senha">
                <input type="password" id="senha" placeholder="•••• •••••• senha">
                <button type="button" class="toggle-senha" onclick="toggleSenha('senha', this)" aria-label="Mostrar/ocultar senha">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="confirmarSenha">Confirmar Senha</label>
            <input type="password" id="confirmarSenha" placeholder="Confirme a senha">
        </div>

        <div class="form-group">
            <label>Status</label>
            <div class="checkbox-group">
                <input type="checkbox" id="ativado" checked>
                <div class="checkbox-label">
                    <span class="label-title">Ativado</span>
                    <span class="label-sub">Usuário Ativo no Sistema</span>
                </div>
            </div>
        </div>

        <p id="mensagem" class="mensagem"></p>

        <button class="btn btn-salvar" onclick="salvarUsuario()">SALVAR</button>
        <button class="btn btn-cancelar" onclick="cancelar()">CANCELAR</button>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
